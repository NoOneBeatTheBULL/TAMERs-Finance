<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAMER 帳務管理器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      padding: 24px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      margin: 0;
    }
    .header p {
      opacity: 0.9;
      margin: 4px 0 0;
    }
    .section {
      padding: 24px;
      border-bottom: 1px solid #e8ecf4;
    }
    .section:last-child {
      border-bottom: none;
    }
    .section h2 {
      margin-bottom: 20px;
      font-size: 20px;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
      align-items: end;
    }
    .form-row label {
      width: 100px;
      text-align: right;
      font-weight: 500;
      color: #555;
      font-size: 14px;
    }
    .form-row input,
    .form-row select,
    .form-row textarea {
      flex: 1;
      min-width: 200px;
      padding: 12px;
      border: 2px solid #e1e5e9;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus {
      outline: none;
      border-color: #3498db;
    }
    .form-row textarea {
      height: 70px;
      resize: vertical;
    }
    button {
      padding: 12px 20px;
      margin: 4px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #3498db;
      color: white;
    }
    .btn-primary:hover {
      background: #2980b9;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #95a5a6;
      color: white;
    }
    .btn-secondary:hover {
      background: #7f8c8d;
    }
    .btn-danger {
      background: #e74c3c;
      color: white;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .list {
      border: 2px solid #e1e5e9;
      border-radius: 8px;
      background: #fafbfc;
      max-height: 450px;
      overflow-y: auto;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e8ecf4;
      transition: background 0.2s;
    }
    .list-item:hover {
      background: white;
    }
    .list-item:last-child {
      border-bottom: none;
    }
    .list-item--income {
      border-left: 4px solid #27ae60;
    }
    .list-item--expense {
      border-left: 4px solid #e74c3c;
    }
    .item-info {
      flex: 1;
    }
    .item-info strong {
      font-size: 16px;
      color: #2c3e50;
    }
    .item-info small {
      color: #7f8c8d;
      font-size: 13px;
    }
    .item-amount {
      font-size: 18px;
      font-weight: bold;
      min-width: 120px;
      text-align: right;
    }
    .item-amount--income {
      color: #27ae60;
    }
    .item-amount--expense {
      color: #e74c3c;
    }
    .balance {
      padding: 20px;
      border-radius: 8px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
    }
    .balance--positive {
      background: #d5f4e6;
      color: #27ae60;
    }
    .balance--negative {
      background: #fadbd8;
      color: #e74c3c;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin: 20px 0;
    }
    .stat-card {
      background: white;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-number {
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
    }
    .stat-label {
      font-size: 12px;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
        align-items: stretch;
      }
      .form-row label {
        width: auto;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>TAMER 帳務管理器</h1>
      <p>投資 + 日常帳務一站式管理 | 支援 LocalStorage 與 CSV 匯出</p>
    </div>

    <!-- 新增交易 -->
    <div class="section">
      <h2>📝 新增交易</h2>
      <div class="form-row">
        <label>類型</label>
        <select id="type">
          <option value="income">收入 💰</option>
          <option value="expense">支出 💸</option>
        </select>
      </div>
      <div class="form-row">
        <label>日期</label>
        <input type="date" id="date">
      </div>
      <div class="form-row">
        <label>金額 (NT$)</label>
        <input type="number" step="0.01" min="0" id="amount" placeholder="1000">
      </div>
      <div class="form-row">
        <label>分類</label>
        <select id="category">
          <option value="salary">薪資</option>
          <option value="bonus">獎金/紅利</option>
          <option value="invest">投資(股票/ETF)</option>
          <option value="dividend">股利/利息</option>
          <option value="sell">賣股/賣資產</option>
          <option value="rent">房租</option>
          <option value="food">餐飲</option>
          <option value="transport">交通</option>
          <option value="medical">醫療</option>
          <option value="insurance">保險</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-row">
        <label>標題</label>
        <input type="text" id="title" placeholder="例如：00631L 買入 10張">
      </div>
      <div class="form-row">
        <label>備註</label>
        <textarea id="note" placeholder="詳細說明，例如：分批買入，成本價 XX 元"></textarea>
      </div>
      <button class="btn-primary" onclick="addTransaction()">新增交易</button>
      <button class="btn-secondary" onclick="resetForm()">清空</button>
    </div>

    <!-- 統計與結餘 -->
    <div class="section">
      <h2>📊 總覽</h2>
      <div class="stats" id="stats"></div>
      <div id="balance" class="balance">目前結餘：NT$ 0</div>
    </div>

    <!-- 交易列表 -->
    <div class="section">
      <h2>📋 交易紀錄 (<span id="recordCount">0</span> 筆)</h2>
      <div id="transactionList" class="list"></div>
    </div>

    <!-- 操作工具 -->
    <div class="section">
      <h2>⚙️ 工具</h2>
      <button class="btn-danger" onclick="clearAll()" style="margin-right: 12px;">🗑️ 清除全部紀錄</button>
      <button class="btn-secondary" onclick="exportToCSV()">📤 匯出 CSV</button>
      <button class="btn-secondary" onclick="importFromCSV()">📥 匯入 CSV</button>
    </div>
  </div>

  <script>
    let transactions = JSON.parse(localStorage.getItem('TAMER_transactions')) || [];
    
    // 初始化日期
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    function updateUI() {
      const listEl = document.getElementById('transactionList');
      const balanceEl = document.getElementById('balance');
      const countEl = document.getElementById('recordCount');
      
      listEl.innerHTML = '';
      let incomeTotal = 0, expenseTotal = 0;
      
      transactions.forEach((t, idx) => {
        const li = document.createElement('div');
        li.className = `list-item list-item--${t.type}`;
        li.innerHTML = `
          <div class="item-info">
            <strong>${t.title || t.category}</strong>
            <br><small>${t.date} | ${t.category} | ${t.note || '無備註'}</small>
          </div>
          <div class="item-amount item-amount--${t.type}">
            ${formatCurrency(t.amount)}
            <br><button class="btn-danger" style="margin-top:4px;padding:4px 8px;font-size:12px;" onclick="removeTransaction(${idx})">刪除</button>
          </div>
        `;
        listEl.appendChild(li);
        
        if (t.type === 'income') incomeTotal += parseFloat(t.amount);
        else expenseTotal += parseFloat(t.amount);
      });
      
      const balance = incomeTotal - expenseTotal;
      countEl.textContent = transactions.length;
      
      balanceEl.textContent = `目前結餘：${formatCurrency(balance)}`;
      balanceEl.className = `balance balance--${balance >= 0 ? 'positive' : 'negative'}`;
      
      updateStats(incomeTotal, expenseTotal);
      saveData();
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat('zh-TW', { 
        style: 'currency', 
        currency: 'TWD',
        minimumFractionDigits: 0 
      }).format(amount);
    }

    function updateStats(income, expense) {
      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-number" style="color: #27ae60;">${formatCurrency(income)}</div>
          <div class="stat-label">總收入</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color: #e74c3c;">${formatCurrency(expense)}</div>
          <div class="stat-label">總支出</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${transactions.length}</div>
          <div class="stat-label">交易筆數</div>
        </div>
      `;
    }

    function addTransaction() {
      const data = {
        type: document.getElementById('type').value,
        date: document.getElementById('date').value,
        amount: parseFloat(document.getElementById('amount').value),
        category: document.getElementById('category').value,
        title: document.getElementById('title').value.trim() || '',
        note: document.getElementById('note').value.trim()
      };

      if (!data.date || isNaN(data.amount) || data.amount <= 0) {
        alert('⚠️ 請確認日期與金額正確！');
        return;
      }

      transactions.unshift(data); // 新增到最前面
      updateUI();
      resetForm();
    }

    function resetForm() {
      document.getElementById('amount').value = '';
      document.getElementById('title').value = '';
      document.getElementById('note').value = '';
    }

    function removeTransaction(idx) {
      if (confirm('確定刪除這筆交易？')) {
        transactions.splice(idx, 1);
        updateUI();
      }
    }

    function clearAll() {
      if (confirm('⚠️ 確定清除「所有」交易紀錄？無法復原！')) {
        transactions = [];
        localStorage.removeItem('TAMER_transactions');
        updateUI();
      }
    }

    function saveData() {
      localStorage.setItem('TAMER_transactions', JSON.stringify(transactions));
    }

    function exportToCSV() {
      if (!transactions.length) {
        alert('沒有交易紀錄可匯出');
        return;
      }
      
      const headers = ['類型', '日期', '金額', '分類', '標題', '備註'];
      const rows = transactions.map(t => [
        t.type === 'income' ? '收入' : '支出',
        t.date,
        t.amount,
        t.category,
        t.title,
        `"${t.note || ''}"`
      ]);
      
      const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
      const blob = new Blob([ '\uFEFF' + csv ], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `TAMER_帳務_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importFromCSV() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.csv';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = ev => {
          const csv = ev.target.result;
          const lines = csv.split('\n').slice(1); // 跳過標頭
          const newTransactions = [];
          
          lines.forEach(line => {
            const cols = line.split(',').map(col => col.replace(/"/g, '').trim());
            if (cols.length >= 3) {
              newTransactions.push({
                type: cols[0] === '收入' ? 'income' : 'expense',
                date: cols[1] || new Date().toISOString().split('T')[0],
                amount: parseFloat(cols[2]) || 0,
                category: cols[3] || 'other',
                title: cols[4] || '',
                note: cols[5] || ''
              });
            }
          });
          
          transactions = [...transactions, ...newTransactions.filter(t => t.amount > 0)];
          updateUI();
          alert(`成功匯入 ${newTransactions.length} 筆交易`);
        };
        reader.readAsText(file, 'utf-8');
      };
      input.click();
    }

    // 初始化
    updateUI();
  </script>
</body>
</html>
