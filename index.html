<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAMER Ultra 帳務儀表板</title>
  <style>
    :root{
      --bg:#0b1020;--bg2:#111827;--panel:#10192acc;--panel2:#0f172aee;--line:#233147;--text:#e5e7eb;--muted:#94a3b8;
      --primary:#60a5fa;--primary2:#3b82f6;--good:#34d399;--bad:#fb7185;--warn:#fbbf24;--shadow:0 18px 50px rgba(0,0,0,.34);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:
      radial-gradient(circle at top left,rgba(59,130,246,.18),transparent 30%),
      radial-gradient(circle at top right,rgba(168,85,247,.16),transparent 28%),
      linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}
    body{padding:18px}
    .wrap{max-width:1400px;margin:0 auto}
    .hero{padding:24px;border:1px solid #243244;border-radius:28px;background:linear-gradient(135deg,rgba(15,23,42,.95),rgba(17,24,39,.88));box-shadow:var(--shadow)}
    .hero-top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap}
    .title{display:flex;flex-direction:column;gap:8px}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:#08111d;border:1px solid #2a3a52;color:#dbeafe;font-size:13px;width:fit-content}
    h1{margin:0;font-size:34px;letter-spacing:.5px}
    .subtitle{color:var(--muted);line-height:1.7;margin:0;max-width:900px}
    .hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
    .hero-stat{padding:16px;border-radius:18px;background:linear-gradient(180deg,#0a1220,#0e1729);border:1px solid #243244}
    .hero-stat .k{font-size:12px;letter-spacing:.9px;text-transform:uppercase;color:var(--muted)}
    .hero-stat .v{font-size:24px;font-weight:900;margin-top:8px}
    .layout{display:grid;grid-template-columns:1.12fr .88fr;gap:18px;margin-top:18px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid #223147;border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(10px);padding:20px}
    .card h2{margin:0 0 16px;font-size:19px;display:flex;align-items:center;gap:10px}
    .form-grid{display:grid;grid-template-columns:120px 1fr;gap:12px 14px;align-items:center}
    label{color:var(--muted);font-size:14px}
    input,select,textarea{width:100%;padding:12px 13px;border-radius:14px;border:1px solid #304255;background:#08111d;color:var(--text);outline:none;transition:.18s}
    textarea{min-height:92px;resize:vertical}
    input::placeholder,textarea::placeholder{color:#64748b}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(96,165,250,.15)}
    .btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    button{border:0;border-radius:14px;padding:11px 15px;cursor:pointer;font-weight:700;transition:.2s transform,.2s box-shadow,.2s opacity;box-shadow:0 6px 18px rgba(0,0,0,.18)}
    button:hover{transform:translateY(-1px)}
    .primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}.good{background:linear-gradient(135deg,#10b981,#34d399);color:#052e16}.ghost{background:#111827;color:#e5e7eb;border:1px solid #334155}.danger{background:linear-gradient(135deg,#ef4444,#fb7185);color:#fff}
    .small{font-size:12px;color:var(--muted)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .stat{padding:16px;border-radius:18px;background:linear-gradient(180deg,#0a1220,#0e1729);border:1px solid #243244}
    .stat .k{font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
    .stat .v{font-size:22px;font-weight:900;margin-top:8px}
    .balance{margin-top:14px;padding:16px;border-radius:18px;font-size:22px;font-weight:900;text-align:center;border:1px solid #263449}
    .balance.pos{background:linear-gradient(135deg,#052e16,#083344);color:#bbf7d0}.balance.neg{background:linear-gradient(135deg,#3f1d1d,#3a0f14);color:#fecaca}
    .filters{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .toolbar .left,.toolbar .right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;border:1px solid #243244;background:#0f172a;color:#cbd5e1;font-size:12px}
    .list{margin-top:12px;border:1px solid #243244;border-radius:18px;overflow:hidden;background:#08111d}
    .item{display:grid;grid-template-columns:1fr auto;gap:12px;padding:16px 18px;border-bottom:1px solid #1f2a3a}
    .item:last-child{border-bottom:none}
    .item:hover{background:#0b1625}
    .title-line{margin:0 0 6px;font-size:16px}
    .meta{color:var(--muted);font-size:13px;line-height:1.7}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .amt{text-align:right;font-weight:900;font-size:18px}.income{color:var(--good)}.expense{color:var(--bad)}
    .sub-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
    .sub-actions button{padding:7px 10px;border-radius:10px;font-size:12px}
    .chart-wrap{margin-top:12px;border-radius:18px;border:1px solid #243244;background:#08111d;padding:12px}
    canvas{width:100%;height:320px;display:block}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .insight{padding:14px;border-radius:16px;background:#0a1220;border:1px solid #243244}
    .insight .k{color:var(--muted);font-size:12px}
    .insight .v{font-size:20px;font-weight:800;margin-top:6px}
    .progress{height:10px;border-radius:999px;background:#0f172a;border:1px solid #243244;overflow:hidden}
    .progress>div{height:100%;background:linear-gradient(90deg,var(--primary),#22c55e)}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    .section{margin-top:18px}
    .sep{height:1px;background:#243244;margin:16px 0}
    @media (max-width: 1100px){.layout{grid-template-columns:1fr}.hero-grid,.stats,.filters,.grid-2{grid-template-columns:repeat(2,1fr)}}
    @media (max-width: 720px){body{padding:12px}h1{font-size:26px}.form-grid{grid-template-columns:1fr}.hero-grid,.stats,.filters,.grid-2{grid-template-columns:1fr}.item{grid-template-columns:1fr}.amt{text-align:left}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-top">
        <div class="title">
          <div class="badge">TAMER Ultra · 無後端強化版</div>
          <h1>更強大的帳務與經濟分析儀表板</h1>
          <p class="subtitle">專注於本機可跑、免後端、介面更順眼，並強化經濟狀況分析、投資/日常分流、預算警示、趨勢圖、備份匯出與實用統計。</p>
        </div>
        <div class="badge">LocalStorage 自動儲存</div>
      </div>
      <div class="hero-grid" id="heroStats"></div>
    </div>

    <div class="layout section">
      <div class="card">
        <h2>✍️ 新增交易</h2>
        <div class="form-grid">
          <label>類型</label><select id="type"><option value="income">收入</option><option value="expense">支出</option></select>
          <label>日期</label><input type="date" id="date">
          <label>金額</label><input type="number" id="amount" min="0" step="0.01" placeholder="1000">
          <label>分類</label><select id="category"><option value="salary">薪資</option><option value="bonus">獎金/紅利</option><option value="invest">投資(股票/ETF)</option><option value="dividend">股利/利息</option><option value="sell">賣股/賣資產</option><option value="rent">房租</option><option value="food">餐飲</option><option value="transport">交通</option><option value="medical">醫療</option><option value="insurance">保險</option><option value="subscription">訂閱</option><option value="other">其他</option></select>
          <label>錢包</label><select id="wallet"><option value="main">主帳戶</option><option value="cash">現金</option><option value="stock">投資帳戶</option></select>
          <label>標題</label><input type="text" id="title" placeholder="例如：00631L 買入">
          <label>備註</label><textarea id="note" placeholder="詳細說明"></textarea>
        </div>
        <div class="btn-row">
          <button class="primary" onclick="addTransaction()">新增交易</button>
          <button class="ghost" onclick="resetForm()">清空欄位</button>
          <button class="good" onclick="addRecurringPreview()">加入本月循環</button>
        </div>
        <div class="sep"></div>
        <div class="small">新增資料會自動儲存於瀏覽器。建議偶爾用 CSV 匯出做備份。</div>
      </div>

      <div class="card">
        <h2>⚙️ 設定與工具</h2>
        <div class="form-grid">
          <label>月預算</label><input type="number" id="monthlyBudget" min="0" step="1" placeholder="例如 30000">
          <label>儲蓄目標</label><input type="number" id="savingGoal" min="0" step="1" placeholder="例如 100000">
        </div>
        <div class="btn-row">
          <button class="primary" onclick="saveSettings()">儲存設定</button>
          <button class="ghost" onclick="exportCSV()">匯出 CSV</button>
          <button class="ghost" onclick="importCSV()">匯入 CSV</button>
          <button class="danger" onclick="clearAll()">清除全部</button>
        </div>
        <div class="sep"></div>
        <div class="grid-2">
          <div class="insight"><div class="k">經濟壓力指數</div><div class="v" id="pressureValue">-</div><div class="progress"><div id="pressureBar" style="width:0%"></div></div></div>
          <div class="insight"><div class="k">現金安全月數</div><div class="v" id="runwayValue">-</div><div class="small">以本月支出估算可撐多久</div></div>
        </div>
      </div>
    </div>

    <div class="card section">
      <h2>📊 總覽</h2>
      <div class="stats" id="stats"></div>
      <div id="balance" class="balance pos">目前結餘：NT$ 0</div>
    </div>

    <div class="card section">
      <div class="toolbar">
        <div class="left"><h2 style="margin:0">🔎 篩選與搜尋</h2></div>
        <div class="right small">可依關鍵字、類型、分類、月份篩選</div>
      </div>
      <div class="filters" style="margin-top:12px">
        <input type="text" id="search" placeholder="搜尋標題/備註/分類" oninput="render()">
        <select id="filterType" onchange="render()"><option value="all">全部類型</option><option value="income">收入</option><option value="expense">支出</option></select>
        <select id="filterCategory" onchange="render()"><option value="all">全部分類</option><option value="salary">薪資</option><option value="bonus">獎金/紅利</option><option value="invest">投資(股票/ETF)</option><option value="dividend">股利/利息</option><option value="sell">賣股/賣資產</option><option value="rent">房租</option><option value="food">餐飲</option><option value="transport">交通</option><option value="medical">醫療</option><option value="insurance">保險</option><option value="subscription">訂閱</option><option value="other">其他</option></select>
        <input type="month" id="filterMonth" onchange="render()">
        <select id="sortBy" onchange="render()"><option value="date_desc">日期新→舊</option><option value="date_asc">日期舊→新</option><option value="amount_desc">金額大→小</option><option value="amount_asc">金額小→大</option></select>
      </div>
    </div>

    <div class="card section">
      <h2>🧾 交易紀錄</h2>
      <div class="list" id="list"></div>
    </div>

    <div class="card section">
      <h2>📈 月度圖表</h2>
      <div class="chart-wrap"><canvas id="chart" width="1200" height="320"></canvas></div>
    </div>

    <div class="card section">
      <h2>🧠 經濟狀況分析</h2>
      <div class="grid-2" id="analysis"></div>
    </div>
  </div>

  <script>
    const LS='TAMER_ultra_v1';
    const CATEGORY_LABELS={salary:'薪資',bonus:'獎金/紅利',invest:'投資(股票/ETF)',dividend:'股利/利息',sell:'賣股/賣資產',rent:'房租',food:'餐飲',transport:'交通',medical:'醫療',insurance:'保險',subscription:'訂閱',other:'其他'};
    const DEFAULT_RECURRING=[{type:'expense',category:'rent',title:'房租',amount:15000,note:'每月固定支出'},{type:'expense',category:'subscription',title:'訂閱費',amount:300,note:'每月循環'},{type:'income',category:'salary',title:'薪資',amount:0,note:'每月收入'}];
    let state=JSON.parse(localStorage.getItem(LS)||'null')||{transactions:[],settings:{monthlyBudget:30000,savingGoal:0}};
    const $=id=>document.getElementById(id);
    const fmt=v=>new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',minimumFractionDigits:0}).format(Number(v||0));
    const today=()=>new Date().toISOString().slice(0,10);
    const ym=()=>new Date().toISOString().slice(0,7);
    const monthName=(m)=>m;
    function save(){localStorage.setItem(LS,JSON.stringify(state))}
    function resetForm(){$('amount').value='';$('title').value='';$('note').value=''}
    function saveSettings(){state.settings.monthlyBudget=Number($('monthlyBudget').value||0);state.settings.savingGoal=Number($('savingGoal').value||0);save();render()}
    function addTransaction(obj){const t=obj||{type:$('type').value,date:$('date').value,amount:Number($('amount').value),category:$('category').value,wallet:$('wallet').value,title:$('title').value.trim(),note:$('note').value.trim()};if(!t.date||!t.amount||t.amount<=0){alert('請輸入正確日期與金額');return}t.id=crypto.randomUUID();t.createdAt=new Date().toISOString();state.transactions.unshift(t);save();render();if(!obj)resetForm()}
    function removeTransaction(id){state.transactions=state.transactions.filter(x=>x.id!==id);save();render()}
    function clearAll(){if(confirm('確定清除全部紀錄？')){state.transactions=[];save();render()}}
    function exportCSV(){if(!state.transactions.length){alert('沒有資料可匯出');return}const headers=['id','type','date','amount','category','wallet','title','note','createdAt'];const rows=state.transactions.map(t=>headers.map(h=>`"${String(t[h]??'').replaceAll('"','""')}"`));const csv=[headers.map(h=>`"${h}"`),...rows].map(r=>r.join(',')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`TAMER_${today()}.csv`;a.click();URL.revokeObjectURL(url)}
    function importCSV(){const input=document.createElement('input');input.type='file';input.accept='.csv';input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const lines=String(ev.target.result).trim().split(/\r?\n/);if(lines.length<2)return;const headers=lines[0].split(',').map(s=>s.replace(/^"|"$|/g,''));const idx=h=>headers.indexOf(h);for(const line of lines.slice(1)){const cols=line.match(/("[^"]*(?:""[^"]*)*"|[^,]+)/g)||[];const get=h=>{const i=idx(h);return i>=0?(cols[i]||'').replace(/^"|"$|/g,'').replace(/""/g,'"'):''};const amount=Number(get('amount'));if(amount>0){state.transactions.push({id:crypto.randomUUID(),type:get('type')||'expense',date:get('date')||today(),amount,category:get('category')||'other',wallet:get('wallet')||'main',title:get('title')||'',note:get('note')||'',createdAt:get('createdAt')||new Date().toISOString()})}}save();render();alert('匯入完成')};r.readAsText(f,'utf-8')};input.click()}
    function addRecurringPreview(){DEFAULT_RECURRING.forEach(x=>addTransaction({type:x.type,date:today(),amount:x.amount,category:x.category,wallet:'main',title:`${x.title}（本月）`,note:x.note||`循環交易 ${ym()}`}))}
    function filteredAndSorted(){const q=($('search').value||'').trim().toLowerCase();const ft=$('filterType').value;const fc=$('filterCategory').value;const fm=$('filterMonth').value;let arr=state.transactions.filter(t=>{const hit=!q||[t.title,t.note,t.category,CATEGORY_LABELS[t.category],t.wallet].join(' ').toLowerCase().includes(q);const mt=!fm||String(t.date||'').startsWith(fm);return hit&&mt&&(ft==='all'||t.type===ft)&&(fc==='all'||t.category===fc)});const s=$('sortBy').value;arr.sort((a,b)=>{const ad=a.date||'',bd=b.date||'';if(s==='date_asc') return ad.localeCompare(bd); if(s==='date_desc') return bd.localeCompare(ad); if(s==='amount_asc') return Number(a.amount||0)-Number(b.amount||0); return Number(b.amount||0)-Number(a.amount||0)});return arr}
    function calc(){const all=state.transactions;const income=all.filter(x=>x.type==='income').reduce((s,x)=>s+Number(x.amount||0),0);const expense=all.filter(x=>x.type==='expense').reduce((s,x)=>s+Number(x.amount||0),0);const balance=income-expense;const thisMonth=ym();const mIncome=all.filter(x=>x.type==='income'&&String(x.date).startsWith(thisMonth)).reduce((s,x)=>s+Number(x.amount||0),0);const mExpense=all.filter(x=>x.type==='expense'&&String(x.date).startsWith(thisMonth)).reduce((s,x)=>s+Number(x.amount||0),0);const foodExpense=all.filter(x=>x.type==='expense'&&x.category==='food'&&String(x.date).startsWith(thisMonth)).reduce((s,x)=>s+Number(x.amount||0),0);const investOut=all.filter(x=>x.type==='expense'&&x.category==='invest').reduce((s,x)=>s+Number(x.amount||0),0);const investIn=all.filter(x=>x.type==='income'&&['dividend','sell'].includes(x.category)).reduce((s,x)=>s+Number(x.amount||0),0);const savingsRate=income>0?((income-expense)/income*100):0;const budgetUse=state.settings.monthlyBudget?mExpense/state.settings.monthlyBudget*100:0;const runway=mExpense>0?balance/mExpense:0;return {income,expense,balance,mIncome,mExpense,foodExpense,investOut,investIn,savingsRate,budgetUse,runway}}
    function render(){const {income,expense,balance,mIncome,mExpense,foodExpense,investOut,investIn,savingsRate,budgetUse,runway}=calc();$('monthlyBudget').value=state.settings.monthlyBudget||'';$('savingGoal').value=state.settings.savingGoal||'';const hp=[['總資產淨結餘',balance],['本月收支差',mIncome-mExpense],['本月支出',mExpense],['本月收入',mIncome]].map(([k,v])=>`<div class="hero-stat"><div class="k">${k}</div><div class="v ${v>=0?'income':'expense'}">${fmt(v)}</div></div>`).join('');$('heroStats').innerHTML=hp;$('stats').innerHTML=`<div class="stat"><div class="k">總收入</div><div class="v income">${fmt(income)}</div></div><div class="stat"><div class="k">總支出</div><div class="v expense">${fmt(expense)}</div></div><div class="stat"><div class="k">本月支出</div><div class="v">${fmt(mExpense)}</div></div><div class="stat"><div class="k">儲蓄率</div><div class="v">${savingsRate.toFixed(1)}%</div></div>`;const bal=$('balance');bal.textContent=`目前結餘：${fmt(balance)}${state.settings.monthlyBudget?` ｜ 本月預算使用 ${Math.round(budgetUse)}%` : ''}`;bal.className='balance '+(balance>=0?'pos':'neg');if(state.settings.monthlyBudget&&budgetUse>=80)bal.textContent+='（預算接近上限）';const pressure=Math.max(0,Math.min(100,Math.round((budgetUse*0.7)+(expense>income?30:0)+(runway<1?20:0))));$('pressureValue').textContent=`${pressure}/100`;$('pressureBar').style.width=`${pressure}%`;$('runwayValue').textContent = runway>0 ? `${runway.toFixed(1)} 個月` : '無法估算';const analysis=[['儲蓄率',`${savingsRate.toFixed(1)}%`,`較高表示你保留收入的能力較強。`],['本月預算使用',`${state.settings.monthlyBudget?Math.round(budgetUse):0}%`,`越接近 100% 代表超支風險越高。`],['飲食占比',`${income>0?(foodExpense/income*100).toFixed(1):'0.0'}%`,`可觀察餐飲花費是否過高。`],['投資現金流',`${fmt(investIn-investOut)}`,`股利/賣出減去投資投入的淨流入。`],['現金安全月數',runway>0?`${runway.toFixed(1)} 月`:'不足以估算',`依目前支出估算結餘可支撐時間。`],['經濟壓力指數',`${pressure}/100`,`分數越高，代表本月壓力越大。`]].map(([k,v,d])=>`<div class="insight"><div class="k">${k}</div><div class="v">${v}</div><div class="small">${d}</div></div>`).join('');$('analysis').innerHTML=analysis;const list=filteredAndSorted();$('list').innerHTML=list.length?list.map(t=>`<div class="item"><div><h3 class="title-line">${escapeHtml(t.title||CATEGORY_LABELS[t.category]||'未命名')}</h3><div class="chips"><span class="chip">${t.type==='income'?'收入':'支出'}</span><span class="chip">${CATEGORY_LABELS[t.category]||t.category}</span><span class="chip">${t.wallet}</span></div><div class="meta">${t.date}${t.note?`｜${escapeHtml(t.note)}`:''}</div></div><div><div class="amt ${t.type==='income'?'income':'expense'}">${fmt(t.amount)}</div><div class="sub-actions"><button class="danger" onclick="removeTransaction('${t.id}')">刪除</button></div></div></div>`).join(''):'<div class="empty">目前沒有符合條件的交易</div>';drawChart(all)}
    function drawChart(data){const c=$('chart'),ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1,rect=c.getBoundingClientRect();c.width=rect.width*dpr;c.height=320*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,rect.width,320);const months=[...Array(6)].map((_,i)=>{const dt=new Date();dt.setMonth(dt.getMonth()-5+i);return dt.toISOString().slice(0,7)});const income=months.map(m=>data.filter(x=>x.type==='income'&&String(x.date).startsWith(m)).reduce((s,x)=>s+Number(x.amount||0),0));const expense=months.map(m=>data.filter(x=>x.type==='expense'&&String(x.date).startsWith(m)).reduce((s,x)=>s+Number(x.amount||0),0));const max=Math.max(1,...income,...expense);const W=rect.width,H=320,pad=34,base=H-34,group=(W-pad*2)/months.length,barW=(group-18)/2;ctx.font='12px system-ui';months.forEach((m,i)=>{const x=pad+i*group;const ih=income[i]/max*(H-82),eh=expense[i]/max*(H-82);ctx.fillStyle='#64748b';ctx.fillText(monthLabel(m),x,base+16);ctx.fillStyle='#22c55e';ctx.fillRect(x,base-ih,barW,ih);ctx.fillStyle='#f87171';ctx.fillRect(x+barW+8,base-eh,barW,eh)});ctx.strokeStyle='#223147';ctx.beginPath();ctx.moveTo(pad,base+.5);ctx.lineTo(W-pad,base+.5);ctx.stroke()}
    function monthLabel(m){const [y,mo]=m.split('-');return `${y}/${mo}`}
    function escapeHtml(s){return String(s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]))}
    $('date').value=today();$('filterMonth').value=ym();render();window.addTransaction=addTransaction;window.resetForm=resetForm;window.saveSettings=saveSettings;window.exportCSV=exportCSV;window.importCSV=importCSV;window.clearAll=clearAll;window.removeTransaction=removeTransaction;window.addRecurringPreview=addRecurringPreview;window.render=render;
  </script>
