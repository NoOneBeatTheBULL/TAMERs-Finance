<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAMER 增強版帳務管理器</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#233041;--muted:#6b7280;--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--border:#dbe3ee;--shadow:0 8px 24px rgba(15,23,42,.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(135deg,#dbeafe,#f8fafc);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .header{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:22px;border-radius:18px;box-shadow:var(--shadow)}
    .header h1{margin:0 0 6px;font-size:28px}
    .header p{margin:0;color:#cbd5e1}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-top:18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px}
    .card h2{margin:0 0 14px;font-size:18px}
    .row{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center;margin-bottom:12px}
    label{font-size:14px;color:var(--muted)}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;color:var(--text)}
    textarea{min-height:84px;resize:vertical}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button{border:0;border-radius:12px;padding:11px 14px;cursor:pointer;transition:.2s transform,.2s opacity}
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--primary);color:#fff}.success{background:var(--success);color:#fff}.danger{background:var(--danger);color:#fff}.light{background:#e5e7eb;color:#111827}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .stat{background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:14px}
    .stat .v{font-size:22px;font-weight:700;margin-top:4px}
    .balance{font-size:22px;font-weight:800;padding:14px;border-radius:16px;margin-top:12px}
    .pos{background:#dcfce7;color:#166534}.neg{background:#fee2e2;color:#991b1b}
    .filters{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
    .list{margin-top:10px;border-top:1px solid var(--border)}
    .item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px 0;border-bottom:1px solid var(--border)}
    .item h3{margin:0 0 4px;font-size:16px}.meta{color:var(--muted);font-size:13px}.amt{font-weight:800;text-align:right}.income{color:var(--success)}.expense{color:var(--danger)}
    .chip{display:inline-block;padding:3px 8px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;margin-right:6px}
    .right{text-align:right}
    .chart{width:100%;height:320px;border:1px solid var(--border);border-radius:16px;background:#fff}
    .section-gap{margin-top:18px}
    .muted{color:var(--muted);font-size:13px}
    .empty{padding:18px;color:var(--muted);text-align:center}
    @media (max-width: 980px){.grid{grid-template-columns:1fr}.stats,.filters{grid-template-columns:repeat(2,1fr)}}
    @media (max-width: 640px){.row{grid-template-columns:1fr}.stats,.filters{grid-template-columns:1fr}.header h1{font-size:24px}.item{grid-template-columns:1fr}.amt{text-align:left}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>TAMER 增強版帳務管理器</h1>
      <p>支援預算、循環交易、搜尋篩選、CSV 匯入匯出、月報表與投資分類</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>新增交易</h2>
        <div class="row"><label>類型</label><select id="type"><option value="income">收入</option><option value="expense">支出</option></select></div>
        <div class="row"><label>日期</label><input type="date" id="date"></div>
        <div class="row"><label>金額</label><input type="number" id="amount" min="0" step="0.01" placeholder="1000"></div>
        <div class="row"><label>分類</label><select id="category"><option value="salary">薪資</option><option value="bonus">獎金/紅利</option><option value="invest">投資(股票/ETF)</option><option value="dividend">股利/利息</option><option value="sell">賣股/賣資產</option><option value="rent">房租</option><option value="food">餐飲</option><option value="transport">交通</option><option value="medical">醫療</option><option value="insurance">保險</option><option value="subscription">訂閱</option><option value="other">其他</option></select></div>
        <div class="row"><label>錢包</label><select id="wallet"><option value="main">主帳戶</option><option value="cash">現金</option><option value="stock">投資帳戶</option></select></div>
        <div class="row"><label>標題</label><input type="text" id="title" placeholder="例如：00631L 買入"></div>
        <div class="row"><label>備註</label><textarea id="note" placeholder="詳細說明"></textarea></div>
        <div class="btns">
          <button class="primary" onclick="addTransaction()">新增交易</button>
          <button class="light" onclick="resetForm()">清空欄位</button>
          <button class="success" onclick="addRecurringPreview()">加入本月循環</button>
        </div>
      </div>

      <div class="card">
        <h2>設定與工具</h2>
        <div class="row"><label>月預算</label><input type="number" id="monthlyBudget" min="0" step="1" placeholder="例如 30000"></div>
        <div class="row"><label>儲蓄目標</label><input type="number" id="savingGoal" min="0" step="1" placeholder="例如 100000"></div>
        <div class="btns">
          <button class="primary" onclick="saveSettings()">儲存設定</button>
          <button class="light" onclick="exportCSV()">匯出 CSV</button>
          <button class="light" onclick="importCSV()">匯入 CSV</button>
          <button class="danger" onclick="clearAll()">清除全部</button>
        </div>
        <div class="section-gap">
          <div class="muted">提醒：預算超過 80% 會顯示警示。</div>
        </div>
      </div>
    </div>

    <div class="card section-gap">
      <h2>總覽</h2>
      <div class="stats" id="stats"></div>
      <div id="balance" class="balance pos">目前結餘：NT$ 0</div>
    </div>

    <div class="card section-gap">
      <h2>篩選與搜尋</h2>
      <div class="filters">
        <input type="text" id="search" placeholder="搜尋標題/備註/分類" oninput="render()">
        <select id="filterType" onchange="render()"><option value="all">全部類型</option><option value="income">收入</option><option value="expense">支出</option></select>
        <select id="filterCategory" onchange="render()"><option value="all">全部分類</option><option value="salary">薪資</option><option value="bonus">獎金/紅利</option><option value="invest">投資(股票/ETF)</option><option value="dividend">股利/利息</option><option value="sell">賣股/賣資產</option><option value="rent">房租</option><option value="food">餐飲</option><option value="transport">交通</option><option value="medical">醫療</option><option value="insurance">保險</option><option value="subscription">訂閱</option><option value="other">其他</option></select>
        <input type="month" id="filterMonth" onchange="render()">
      </div>
    </div>

    <div class="card section-gap">
      <h2>交易紀錄</h2>
      <div class="list" id="list"></div>
    </div>

    <div class="card section-gap">
      <h2>月度圖表</h2>
      <canvas id="chart" class="chart" width="1200" height="320"></canvas>
    </div>
  </div>

  <script>
    const LS='TAMER_v2';
    const CATEGORY_LABELS={salary:'薪資',bonus:'獎金/紅利',invest:'投資(股票/ETF)',dividend:'股利/利息',sell:'賣股/賣資產',rent:'房租',food:'餐飲',transport:'交通',medical:'醫療',insurance:'保險',subscription:'訂閱',other:'其他'};
    const DEFAULT_RECURRING=[{type:'expense',category:'rent',title:'房租',amount:15000,note:'每月固定支出'},{type:'expense',category:'subscription',title:'訂閱費',amount:300,note:'每月循環'},{type:'income',category:'salary',title:'薪資',amount:0,note:'每月收入'}];
    let state=JSON.parse(localStorage.getItem(LS)||'null')||{transactions:[],settings:{monthlyBudget:30000,savingGoal:0}};

    const fmt=v=>new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',minimumFractionDigits:0}).format(Number(v||0));
    const today=()=>new Date().toISOString().slice(0,10);
    const ym=()=>new Date().toISOString().slice(0,7);
    const byId=id=>document.getElementById(id);

    function save(){localStorage.setItem(LS,JSON.stringify(state))}
    function loadSettings(){byId('monthlyBudget').value=state.settings.monthlyBudget||'';byId('savingGoal').value=state.settings.savingGoal||''}
    function saveSettings(){state.settings.monthlyBudget=Number(byId('monthlyBudget').value||0);state.settings.savingGoal=Number(byId('savingGoal').value||0);save();render()}
    function resetForm(){byId('amount').value='';byId('title').value='';byId('note').value=''}
    function addTransaction(obj){const t=obj||{type:byId('type').value,date:byId('date').value,amount:Number(byId('amount').value),category:byId('category').value,wallet:byId('wallet').value,title:byId('title').value.trim(),note:byId('note').value.trim()};if(!t.date||!t.amount||t.amount<=0){alert('請輸入正確日期與金額');return}t.id=crypto.randomUUID();t.createdAt=new Date().toISOString();state.transactions.unshift(t);save();render();if(!obj)resetForm()}
    function removeTransaction(id){state.transactions=state.transactions.filter(x=>x.id!==id);save();render()}
    function clearAll(){if(confirm('確定清除全部紀錄？')){state.transactions=[];save();render()}}
    function exportCSV(){if(!state.transactions.length){alert('沒有資料可匯出');return}const headers=['id','type','date','amount','category','wallet','title','note','createdAt'];const rows=state.transactions.map(t=>headers.map(h=>`"${String(t[h]??'').replaceAll('"','""')}"`));const csv=[headers.map(h=>`"${h}"`),...rows].map(r=>r.join(',')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`TAMER_${today()}.csv`;a.click();URL.revokeObjectURL(url)}
    function importCSV(){const input=document.createElement('input');input.type='file';input.accept='.csv';input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const lines=String(ev.target.result).trim().split(/\r?\n/);if(lines.length<2)return;const headers=lines[0].split(',').map(s=>s.replace(/^"|"$|/g,''));const idx=h=>headers.indexOf(h);for(const line of lines.slice(1)){const cols=line.match(/("[^"]*(?:""[^"]*)*"|[^,]+)/g)||[];const get=h=>{const i=idx(h);return i>=0?(cols[i]||'').replace(/^"|"$|/g,'').replace(/""/g,'"'):''};const amount=Number(get('amount'));if(amount>0){state.transactions.push({id:crypto.randomUUID(),type:get('type')||'expense',date:get('date')||today(),amount,category:get('category')||'other',wallet:get('wallet')||'main',title:get('title')||'',note:get('note')||'',createdAt:get('createdAt')||new Date().toISOString()})}}save();render();alert('匯入完成')};r.readAsText(f,'utf-8')};input.click()}
    function addRecurringPreview(){const m=ym();DEFAULT_RECURRING.forEach(x=>addTransaction({type:x.type,date:today(),amount:x.amount,category:x.category,wallet:x.type==='income'?'main':'main',title:`${x.title}（本月）`,note:x.note||`循環交易 ${m}`}))}
    function filtered(){const q=(byId('search').value||'').trim().toLowerCase();const ft=byId('filterType').value;const fc=byId('filterCategory').value;const fm=byId('filterMonth').value;return state.transactions.filter(t=>{const hit=!q||[t.title,t.note,t.category,CATEGORY_LABELS[t.category],t.wallet].join(' ').toLowerCase().includes(q);const mt=!fm||String(t.date||'').startsWith(fm);const ty=ft==='all'||t.type===ft;const ca=fc==='all'||t.category===fc;return hit&&mt&&ty&&ca})}
    function render(){loadSettings();const list=filtered();const all=state.transactions;const income=all.filter(x=>x.type==='income').reduce((s,x)=>s+Number(x.amount||0),0);const expense=all.filter(x=>x.type==='expense').reduce((s,x)=>s+Number(x.amount||0),0);const balance=income-expense;const mExpense=all.filter(x=>x.type==='expense'&&String(x.date).startsWith(ym())).reduce((s,x)=>s+Number(x.amount||0),0);const saving=Number(state.settings.savingGoal||0);document.getElementById('stats').innerHTML=`<div class="stat"><div class="muted">總收入</div><div class="v income">${fmt(income)}</div></div><div class="stat"><div class="muted">總支出</div><div class="v expense">${fmt(expense)}</div></div><div class="stat"><div class="muted">本月支出</div><div class="v">${fmt(mExpense)}</div></div><div class="stat"><div class="muted">儲蓄目標</div><div class="v">${fmt(saving)}</div></div>`;const bal=document.getElementById('balance');bal.textContent=`目前結餘：${fmt(balance)}${state.settings.monthlyBudget?` ｜ 本月預算使用 ${Math.round(mExpense/state.settings.monthlyBudget*100)}%` : ''}`;bal.className='balance '+(balance>=0?'pos':'neg');if(state.settings.monthlyBudget&&mExpense>=state.settings.monthlyBudget*0.8)bal.textContent+='（預算接近上限）';document.getElementById('list').innerHTML=list.length?list.map(t=>`<div class="item"><div><h3>${escapeHtml(t.title||CATEGORY_LABELS[t.category]||'未命名')}</h3><div class="meta"><span class="chip">${t.type==='income'?'收入':'支出'}</span><span class="chip">${CATEGORY_LABELS[t.category]||t.category}</span><span class="chip">${t.wallet}</span>${t.date}${t.note?`｜${escapeHtml(t.note)}`:''}</div></div><div class="amt ${t.type==='income'?'income':'expense'}">${fmt(t.amount)}<div class="right"><button class="danger" style="padding:6px 10px;margin-top:8px" onclick="removeTransaction('${t.id}')">刪除</button></div></div></div>`).join(''):'<div class="empty">目前沒有符合條件的交易</div>';drawChart(all)}
    function drawChart(data){const c=document.getElementById('chart'),ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1;const rect=c.getBoundingClientRect();c.width=rect.width*dpr;c.height=320*dpr;ctx.scale(dpr,dpr);ctx.clearRect(0,0,rect.width,320);const months=[...Array(6)].map((_,i)=>{const dt=new Date();dt.setMonth(dt.getMonth()-5+i);return dt.toISOString().slice(0,7)});const income=months.map(m=>data.filter(x=>x.type==='income'&&String(x.date).startsWith(m)).reduce((s,x)=>s+Number(x.amount||0),0));const expense=months.map(m=>data.filter(x=>x.type==='expense'&&String(x.date).startsWith(m)).reduce((s,x)=>s+Number(x.amount||0),0));const max=Math.max(1,...income,...expense);const W=rect.width,H=320,pad=36,base=H-36,barW=(W-pad*2)/months.length/3;ctx.font='12px sans-serif';ctx.fillStyle='#6b7280';months.forEach((m,i)=>{const x=pad+i*(barW*3);ctx.fillText(m,x,base+16);const ih=income[i]/max*(H-90),eh=expense[i]/max*(H-90);ctx.fillStyle='#16a34a';ctx.fillRect(x,base-ih,barW,ih);ctx.fillStyle='#dc2626';ctx.fillRect(x+barW+6,base-eh,barW,eh)});ctx.beginPath();ctx.strokeStyle='#cbd5e1';ctx.moveTo(pad,base+1);ctx.lineTo(W-pad,base+1);ctx.stroke()}
    function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    document.getElementById('date').value=today();document.getElementById('filterMonth').value=ym();loadSettings();render();
    window.addTransaction=addTransaction;window.resetForm=resetForm;window.saveSettings=saveSettings;window.exportCSV=exportCSV;window.importCSV=importCSV;window.clearAll=clearAll;window.removeTransaction=removeTransaction;window.addRecurringPreview=addRecurringPreview;window.render=render;
  </script>
</body>
</html>
